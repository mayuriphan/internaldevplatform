name: Build, Push & Deploy

on:
  push:
    branches:
      - master

  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

permissions:
  id-token: write
  contents: write

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  API_REPOSITORY: ${{ secrets.API_ECR_REPOSITORY }}
  WORKER_REPOSITORY: ${{ secrets.WORKER_ECR_REPOSITORY }}

jobs:

#############################################################
# BUILD IMAGES
#############################################################

  build:

    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      ecr_registry: ${{ steps.meta.outputs.registry }}

    steps:

      ########################################################
      # Checkout
      ########################################################

      - name: Checkout Repository
        uses: actions/checkout@v4

      ########################################################
      # AWS OIDC Login
      ########################################################

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      ########################################################
      # Login to ECR
      ########################################################

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      ########################################################
      # Setup Docker Buildx
      ########################################################

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      ########################################################
      # Generate Metadata
      ########################################################

      - name: Generate Image Metadata
        id: meta
        run: |

          ACCOUNT_ID=$(aws sts get-caller-identity \
            --query Account \
            --output text)

          REGISTRY=${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com

          TAG=${GITHUB_SHA::7}

          echo "registry=$REGISTRY" >> $GITHUB_OUTPUT
          echo "image_tag=$TAG" >> $GITHUB_OUTPUT

      ########################################################
      # Build & Push API
      ########################################################

      - name: Build and Push API Image
        uses: docker/build-push-action@v6

        with:

          context: ./services/api-python

          push: true

          tags: |
            ${{ steps.meta.outputs.registry }}/${{ env.API_REPOSITORY }}:${{ steps.meta.outputs.image_tag }}

          cache-from: type=gha
          cache-to: type=gha,mode=max

      ########################################################
      # Build & Push Worker
      ########################################################

      - name: Build and Push Worker Image
        uses: docker/build-push-action@v6

        with:

          context: .
          file: ./services/worker-python/Dockerfile

          push: true

          tags: |
            ${{ steps.meta.outputs.registry }}/${{ env.WORKER_REPOSITORY }}:${{ steps.meta.outputs.image_tag }}

          cache-from: type=gha
          cache-to: type=gha,mode=max

#############################################################
# UPDATE GITOPS
#############################################################

  update-gitops:

    name: Update GitOps Repository

    runs-on: ubuntu-latest

    needs: build

    steps:

      ########################################################
      # Clone GitOps Repo
      ########################################################

      - name: Clone GitOps Repository
        run: |

          git clone \
          https://x-access-token:${{ secrets.GITOPS_PAT }}@github.com/${{ vars.GITOPS_REPO }}.git

      ########################################################
      # Install yq
      ########################################################

      - name: Install yq
        run: |

          sudo wget -qO /usr/local/bin/yq \
          https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64

          sudo chmod +x /usr/local/bin/yq

      ########################################################
      # Update API Image
      ########################################################

      - name: Update API Deployment

        run: |

          cd git-ops

          yq -i '

          (.spec.template.spec.containers[]
          | select(.name=="api")
          | .image)

          = "idp-api:${{ needs.build.outputs.image_tag }}"

          ' apps/idp/api/api-deployment.yaml

      ########################################################
      # Update Worker Image
      ########################################################

      - name: Update Worker Deployment

        run: |

          cd git-ops

          yq -i '

          (.spec.template.spec.containers[]
          | select(.name=="worker")
          | .image)

          = "idp-worker:${{ needs.build.outputs.image_tag }}"

          ' apps/idp/worker/worker-deployment.yaml

      ########################################################
      # Commit
      ########################################################

      - name: Commit Changes

        run: |

          cd git-ops

          git config user.name "github-actions"

          git config user.email "github-actions@github.com"

          git add .

          git diff --cached --quiet && exit 0

          git commit -m \
          "Deploy image ${{ needs.build.outputs.image_tag }}"

          git push