name: Build and Push Images

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:

    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      API_REPOSITORY: ${{ vars.API_ECR_REPOSITORY }}
      WORKER_REPOSITORY: ${{ vars.WORKER_ECR_REPOSITORY }}

    steps:

      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Get AWS Account ID
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "ECR_REGISTRY=${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com" >> $GITHUB_ENV

      - name: Set Image Tag
        run: |
          echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      #########################################
      # API
      #########################################

      - name: Build API Image
        run: |
          docker build \
            -t $ECR_REGISTRY/$API_REPOSITORY:$IMAGE_TAG \
            services/api-python

      - name: Push API Image
        run: |
          docker push \
            $ECR_REGISTRY/$API_REPOSITORY:$IMAGE_TAG

      #########################################
      # Worker
      #########################################

      - name: Build Worker Image
        run: |
          docker build \
            -t $ECR_REGISTRY/$WORKER_REPOSITORY:$IMAGE_TAG \
            services/worker-python

      - name: Push Worker Image
        run: |
          docker push \
            $ECR_REGISTRY/$WORKER_REPOSITORY:$IMAGE_TAG