apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: idp-platform
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/your-org/idp-platform
    targetRevision: main
    path: infra/k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: idp

  syncPolicy:
    automated:
      prune: true
      selfHeal: true